name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, without v prefix (for example 1.3.3 or 1.4.0-beta.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Clean cache
        run: npm cache clean --force
  
      - name: Verify Node.js version
        run: node -v

      - name: Verify Npm version
        run: npm -v
            
      - name: Extract version from release
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        run: |
          # Update the version in package.json
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "Updated package.json to version ${{ steps.get_version.outputs.version }}"

      - name: Install dependencies
        run: npm ci
    
      - name: Build the project
        run: npm run build

      - name: Determine npm dist-tag
        id: determine_dist_tag
        run: |
          # Determine dist tag for npm publish.
          # If the version has a pre-release identifier, use it as dist-tag
          # (e.g. v1.2.3-alpha.1 => tag "alpha"). Otherwise use "latest".
          VERSION="${{ steps.get_version.outputs.version }}"

          if [[ "$VERSION" == *"-"* ]]; then
            PR=${VERSION#*-}
            LABEL=${PR%%.*}
            echo "dist_tag=$LABEL" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.determine_dist_tag.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
